<html lang="es">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#111827;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;font-family:'DM Sans',sans-serif;}
.outer{width:100%;max-width:430px;min-height:100vh;background:#0f1220;display:flex;flex-direction:column;position:relative;}
/* STATUS BAR */
.statusbar{height:46px;background:#0f1220;display:flex;align-items:flex-end;justify-content:space-between;padding:0 22px 8px;position:sticky;top:0;z-index:50;flex-shrink:0;}
.s-time{color:#fff;font-size:14px;font-weight:700;}
.s-icons{display:flex;gap:5px;align-items:center;}
/* MAIN SCREEN */
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;}
.screen::-webkit-scrollbar{display:none;}
/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,12,24,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.06);display:flex;padding:8px 0 18px;z-index:100;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;}
.ni-icon{font-size:20px;transition:transform .2s;}
.ni.active .ni-icon{transform:scale(1.2);}
.ni-label{font-size:9.5px;font-weight:700;letter-spacing:.3px;transition:color .2s;}
.ni.active .ni-label{color:#C9963A;}
.ni:not(.active) .ni-label{color:rgba(255,255,255,.28);}
/* HERO */
.hero{margin:14px;border-radius:22px;padding:26px 22px 24px;background:linear-gradient(135deg,#1f2850,#2d1535);position:relative;overflow:hidden;}
.hc1{position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:rgba(139,38,53,.18);}
.hc2{position:absolute;bottom:-40px;left:-30px;width:130px;height:130px;border-radius:50%;background:rgba(201,150,58,.08);}
.h-greet{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:4px;}
.h-name{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:#fff;line-height:1.15;margin-bottom:14px;position:relative;z-index:1;}
.h-name span{color:#C9963A;}
.h-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(201,150,58,.13);border:1px solid rgba(201,150,58,.28);border-radius:100px;padding:5px 14px;font-size:10.5px;font-weight:700;color:#C9963A;}
.hdot{width:5px;height:5px;border-radius:50%;background:#C9963A;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* SECTION HEADER */
.sh{padding:16px 14px 10px;}
.sh-tag{font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#C9963A;margin-bottom:5px;}
.sh-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:#fff;line-height:1.2;}
.sh-sub{font-size:11.5px;color:rgba(255,255,255,.38);margin-top:4px;line-height:1.5;}
/* QUICK GRID */
.qgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 14px 16px;}
.qi{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;}
.qi:active{transform:scale(.95);background:rgba(255,255,255,.09);}
.qi-e{font-size:20px;margin-bottom:5px;}
.qi-l{font-size:9.5px;font-weight:600;color:rgba(255,255,255,.5);line-height:1.3;}
/* STAT STRIP */
.sstrip{display:flex;gap:8px;padding:0 14px 16px;overflow-x:auto;}
.sstrip::-webkit-scrollbar{display:none;}
.spill{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 16px;flex-shrink:0;min-width:115px;}
.spill-v{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:#fff;}
.spill-l{font-size:10px;color:rgba(255,255,255,.38);margin-top:2px;}
/* FEATURED SCROLL */
.fscroll{display:flex;gap:10px;padding:0 14px 16px;overflow-x:auto;}
.fscroll::-webkit-scrollbar{display:none;}
.fc{flex-shrink:0;width:165px;border-radius:16px;padding:16px;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,.08);}
.fc:hover{transform:translateY(-2px);}
.fc-e{font-size:26px;margin-bottom:10px;}
.fc-p{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff;}
.fc-t{font-size:11px;font-weight:600;color:rgba(255,255,255,.8);margin-top:3px;line-height:1.3;}
.fc-tg{font-size:9px;font-weight:700;margin-top:7px;}
/* PRODUCTS */
.pfilt{display:flex;gap:7px;padding:0 14px 14px;overflow-x:auto;}
.pfilt::-webkit-scrollbar{display:none;}
.fbtn{flex-shrink:0;padding:6px 14px;border-radius:100px;border:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;}
.fbtn.on{background:#8B2635;color:#fff;}
.fbtn:not(.on){background:rgba(255,255,255,.07);color:rgba(255,255,255,.45);}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px 14px;}
.pcard{border-radius:14px;padding:14px;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,.07);position:relative;overflow:hidden;}
.pcard:active{transform:scale(.96);}
.pcard-bar{position:absolute;top:0;left:0;right:0;height:3px;}
.pcard-e{font-size:24px;margin-bottom:8px;display:block;}
.pcard-p{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#fff;}
.pcard-t{font-size:11px;font-weight:600;color:rgba(255,255,255,.85);margin-top:3px;line-height:1.3;}
.pcard-b{display:inline-block;font-size:8.5px;font-weight:700;padding:2px 7px;border-radius:100px;margin-top:6px;background:rgba(255,255,255,.09);color:rgba(255,255,255,.6);}
/* PLAN */
.pitem{margin:0 14px 10px;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.07);}
.phdr{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;background:rgba(255,255,255,.04);}
.pdot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;}
.pname{font-size:13px;font-weight:700;color:#fff;}
.pwks{font-size:10px;color:#C9963A;font-weight:600;margin-top:2px;}
.parr{font-size:18px;color:rgba(255,255,255,.28);margin-left:auto;transition:transform .25s;}
.ptasks{background:rgba(0,0,0,.2);padding:4px 14px 10px;display:none;}
.ptask{display:flex;gap:7px;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11.5px;color:rgba(255,255,255,.6);line-height:1.5;}
.ptask:last-child{border-bottom:none;}
.ptask::before{content:'→';color:#C9963A;flex-shrink:0;margin-top:1px;}
/* OPP */
.ogrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px 16px;}
.ocard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px 13px;cursor:pointer;transition:all .2s;}
.ocard:hover{background:rgba(26,32,64,.9);border-color:#C9963A;}
.ocard-e{font-size:22px;margin-bottom:8px;}
.ocard-t{font-size:11px;font-weight:700;color:#fff;margin-bottom:5px;line-height:1.3;}
.ocard-v{font-size:10px;font-weight:600;color:#C9963A;}
/* FINANCE */
.flist{padding:0 14px 16px;display:flex;flex-direction:column;gap:8px;}
.frow{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px;}
.ftop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;}
.fper{font-size:10.5px;font-weight:700;color:rgba(255,255,255,.42);letter-spacing:.5px;text-transform:uppercase;}
.famt{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#fff;}
.fbarbg{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.fbarf{height:100%;border-radius:3px;}
/* PROFILE */
.pav{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#8B2635,#1a2040);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:22px;font-family:'Playfair Display',serif;font-weight:900;color:#C9963A;}
.pcard2{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden;margin-bottom:12px;}
.prow{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);}
.prow:last-child{border-bottom:none;}
.pre{font-size:18px;width:28px;text-align:center;}
.plbl{font-size:10px;color:rgba(255,255,255,.32);margin-bottom:2px;}
.pval{font-size:12.5px;font-weight:600;color:#fff;}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.msheet{background:#171b30;border-radius:24px 24px 0 0;width:100%;max-width:430px;padding:22px 20px 36px;max-height:88vh;overflow-y:auto;}
.msheet::-webkit-scrollbar{display:none;}
.mhandle{width:36px;height:3px;background:rgba(255,255,255,.14);border-radius:2px;margin:0 auto 18px;}
.mclose{width:100%;margin-top:8px;padding:11px;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:11px;color:rgba(255,255,255,.4);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.mbuy{width:100%;padding:14px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:#fff;cursor:pointer;}
</style>
</head>

function go(t){

function productosHTML(){
  const cats=[{id:'todos',l:'Todos'},{id:'basico',l:'$149–$199'},{id:'medio',l:'$299–$499'},{id:'premium',l:'$699+'}];
  const fil=products.filter(p=>{
    if(pfilter==='todos')return true;
    const n=parseInt(p.price.replace('$',''));
    if(pfilter==='basico')return n<=199;
    if(pfilter==='medio')return n>=299&&n<=499;
    return n>=699;
  });
  return `
  <div class="sh"><div class="sh-tag">Catálogo completo</div><div class="sh-title">10 productos digitales</div><div class="sh-sub">Educación financiera para el contexto fronterizo</div></div>

  <div class="pgrid">
    ${fil.map(p=>`<div class="pcard" style="background:${p.color}13;" onclick="openModal(${p.id})"><div class="pcard-bar" style="background:${p.color};"></div><span class="pcard-e">${p.e}</span><div class="pcard-p">${p.price}</div><div class="pcard-t">${p.title}</div><div class="pcard-b">${p.tag}</div></div>`).join('')}

}

  });
}

function openModal(id){
  const p=products.find(x=>x.id===id);
  document.getElementById('msheet').innerHTML=`
    <div class="mhandle"></div>
    <div style="font-size:42px;text-align:center;margin-bottom:12px;">${p.e}</div>
    <div style="text-align:center;margin-bottom:16px;">
      <div style="display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.8px;padding:3px 11px;border-radius:100px;background:${p.color}25;color:${p.color};margin-bottom:8px;">${p.tag}</div>
      <div style="font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:#fff;margin-bottom:3px;">${p.title}</div>
      <div style="font-size:12.5px;color:rgba(255,255,255,.42);">${p.sub}</div>
    </div>
    <div style="font-size:12.5px;color:rgba(255,255,255,.7);line-height:1.7;margin-bottom:16px;">${p.desc}</div>
    <div style="display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap;">
      ${[['Formato',p.format],['Para quién',p.aud],['Precio',p.price+' MXN']].map(([l,v])=>`<div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:7px 12px;"><div style="font-size:9px;color:rgba(255,255,255,.32);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;">${l}</div><div style="font-size:11.5px;color:rgba(255,255,255,.75);font-weight:600;">${v}</div></div>`).join('')}
    </div>
    <button class="mbuy" style="background:${p.color};">Obtener por ${p.price} MXN →</button>
    <button class="mclose" onclick="closeModal()">Cerrar</button>`;
  document.getElementById('modal').classList.add('open');
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modal')||e.target.classList.contains('mclose')){
    document.getElementById('modal').classList.remove('open');
  }
}
